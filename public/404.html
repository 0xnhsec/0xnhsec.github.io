<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Halaman Tidak Ditemukan | Portfolio</title>
    <meta name="description" content="Halaman yang kamu cari tidak ditemukan." />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #f1f5f9;
        --bg-dark: #0a1628;
        --primary: #1e3a5f;
        --blue-light: #2d5a87;
        --text: #1e293b;
        --text-muted: #64748b;
        --white: #ffffff;
        --red: #ef4444;
        --red-light: #fee2e2;
        --red-border: #fecaca;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        position: relative;
        overflow: hidden;
      }
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }
      .blob-1 {
        width: 400px; height: 400px;
        background: rgba(30,58,95,0.08);
        top: -100px; left: -100px;
      }
      .blob-2 {
        width: 400px; height: 400px;
        background: rgba(239,68,68,0.08);
        bottom: -100px; right: -100px;
      }
      .grid-bg {
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(30,58,95,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(30,58,95,0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }
      .content {
        position: relative;
        z-index: 10;
        text-align: center;
        max-width: 560px;
        width: 100%;
      }
      .four-o-four {
        font-size: clamp(100px, 20vw, 180px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.05em;
        background: linear-gradient(135deg, #1e3a5f, #2d5a87, #5b9bd5);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1.5rem;
      }
      .icon-box {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 72px; height: 72px;
        border-radius: 16px;
        background: var(--red-light);
        border: 1px solid var(--red-border);
        margin-bottom: 1.5rem;
        font-size: 2rem;
      }
      h1 {
        font-size: clamp(1.75rem, 5vw, 2.5rem);
        font-weight: 700;
        color: var(--text);
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.05rem;
        color: var(--text-muted);
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }
      .code-block {
        display: inline-block;
        background: var(--white);
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 0.6rem 1.2rem;
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        color: var(--text);
        margin-bottom: 2.5rem;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      }
      .code-block .prefix { color: #94a3b8; }
      .code-block .err { color: var(--red); }
      .cursor {
        display: inline-block;
        width: 8px; height: 16px;
        background: #94a3b8;
        margin-left: 2px;
        vertical-align: middle;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
        margin-bottom: 1.5rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        border-radius: 12px;
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 14px rgba(30,58,95,0.3);
      }
      .btn-primary:hover {
        background: var(--blue-light);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(30,58,95,0.35);
      }
      .btn-secondary {
        background: white;
        color: var(--text);
        border: 1px solid #e2e8f0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      }
      .btn-secondary:hover {
        background: #f8fafc;
        transform: translateY(-2px);
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.875rem;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.2s;
      }
      .back-link:hover { color: var(--primary); }
      .arrow { transition: transform 0.2s; }
      .back-link:hover .arrow { transform: translateX(-4px); }
      @media (prefers-color-scheme: dark) {
        body { background-color: var(--bg-dark); color: #e2e8f0; }
        h1 { color: #e2e8f0; }
        p { color: #94a3b8; }
        .four-o-four {
          background: linear-gradient(135deg, #60a5fa, #818cf8, #93c5fd);
          -webkit-background-clip: text;
          background-clip: text;
        }
        .code-block { background: #1e293b; border-color: #334155; color: #e2e8f0; }
        .btn-secondary { background: #1e293b; border-color: #334155; color: #e2e8f0; }
        .btn-secondary:hover { background: #0f172a; }
        .blob-1 { background: rgba(96,165,250,0.06); }
        .blob-2 { background: rgba(239,68,68,0.06); }
        .icon-box { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); }
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="grid-bg"></div>

    <div class="content">
      <div class="four-o-four">404</div>

      <div class="icon-box">⚠️</div>

      <h1>Halaman Tidak Ditemukan</h1>

      <p>
        Oops! Halaman yang kamu cari tidak ada atau telah dipindahkan.<br/>
        Coba kembali ke halaman utama portfolio.
      </p>

      <div class="code-block">
        <span class="prefix">$ </span>
        <span class="err">Error 404:</span>
        Page not found
        <span class="cursor"></span>
      </div>

      <div class="btn-group">
        <a href="/" class="btn btn-primary" id="btn-go-home">
          🏠 Kembali ke Beranda
        </a>
        <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="btn btn-secondary" id="btn-github">
          🐙 Kunjungi GitHub
        </a>
      </div>

      <a href="/" class="back-link" id="btn-back-link">
        <span class="arrow">←</span>
        <span>Atau klik di sini untuk kembali</span>
      </a>
    </div>
  </body>
</html>
